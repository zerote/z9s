apiVersion: apps/v1
kind: Deployment
metadata:
  name: degraded-demo
  labels:
    app: degraded-demo
spec:
  replicas: 1
  # Short deadline so the failed image pull flips the app to Degraded quickly.
  progressDeadlineSeconds: 30
  selector:
    matchLabels:
      app: degraded-demo
  template:
    metadata:
      labels:
        app: degraded-demo
    spec:
      containers:
        # Invalid image tag on purpose -> ImagePullBackOff -> ArgoCD health: Degraded
        - name: app
          image: nginx:this-tag-does-not-exist-9999
          ports:
            - containerPort: 80
